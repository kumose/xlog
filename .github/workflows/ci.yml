name: CI

on:
  push:
    branches: [master, refine_dev, dev]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    uses: kumose/x-ci/.github/workflows/ci-template.yml@v1
    with:
      config-command: |
        cmake --preset=default -DKMCMAKE_BUILD_TEST=ON -DCMAKE_BUILD_TYPE=Release
      build-command: |
        cmake --build build --parallel
      test-command: |
        ctest --test-dir build --output-on-failure -j1
      skip-macos-x86: true
      skip-windows: true
      skip-windows-arm64: true
      skip-linux-musl-arm64: true

  # MSVC + kmpkg x64-windows (shared x-ci Windows job uses MinGW via Unix Makefiles preset).
  windows-msvc:
    uses: ./.github/workflows/windows.yml
